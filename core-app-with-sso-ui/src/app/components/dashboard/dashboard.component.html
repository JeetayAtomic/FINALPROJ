<app-header></app-header>

<main class="dashboard-main">
  <!-- Full App Grid on Dashboard -->
  <section class="apps-section">
    <h3>Your Applications</h3>
    @if (loading()) {
      <div class="loading-state">
        <span class="spinner-large"></span>
        <p>Loading applications...</p>
      </div>
    } @else {
      <div class="full-app-grid">
        @for (app of apps(); track app.id) {
          <div class="app-card" (click)="openApp(app)">
            <div class="card-icon" [style.background-color]="app.iconColor">
              <span class="material-icons">{{ app.iconName }}</span>
            </div>
            <div class="card-info">
              <h4>{{ app.name }}</h4>
              <p>{{ app.description }}</p>
            </div>
            <span class="material-icons card-arrow">arrow_forward</span>
          </div>
        }
      </div>
    }
  </section>
</main>
